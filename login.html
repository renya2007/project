<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Вход в личный кабинет | Клиентский портал</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="static/log.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
 
    <div class="container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6-4h12a2 2 0 002-2v-4a2 2 0 00-2-2H6a2 2 0 00-2 2v4a2 2 0 002 2zm10-2V9a2 2 0 00-2-2h-4a2 2 0 00-2 2v4a2 2 0 002 2h4a2 2 0 002-2z"/>
                    </svg>
                </div>
                <h1>Добро пожаловать</h1>
                <p class="subtitle">Войдите в свой аккаунт</p>
            </div>
 
            <div id="messageContainer"></div>
 
            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group">
                        <span class="input-icon">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </span>
                        <input type="email" id="email" name="email" placeholder="Электронная почта" required autocomplete="email">
                    </div>
                </div>
 
                <div class="form-group">
                    <div class="input-group password-wrapper">
                        <span class="input-icon">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6-4h12a2 2 0 002-2v-4a2 2 0 00-2-2H6a2 2 0 00-2 2v4a2 2 0 002 2zm10-2V9a2 2 0 00-2-2h-4a2 2 0 00-2 2v4a2 2 0 002 2h4a2 2 0 002-2z"/>
                            </svg>
                        </span>
                        <input type="password" id="password" name="password" placeholder="Пароль" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
 
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> Запомнить меня
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">Забыли пароль?</a>
                </div>
 
                <button type="submit" class="btn btn-primary" onclick="window.location.href='cab.html'" id="submitBtn">Войти</button>
            </form>
 
            <div class="divider">
                <span>или войти через</span>
            </div>
 
            <div class="social-buttons">
                <button class="social-btn" onclick="window.location.href='https://accounts.google.com/v3/signin/identifier?authuser=0&continue=https%3A%2F%2Fmyaccount.google.com%2F%3Futm_source%3Dsign_in_no_continue%26pli%3D1&ec=GAlAwAE&hl=ru&service=accountsettings&flowName=GlifWebSignIn&flowEntry=AddSession&dsh=S1762112746%3A1775219958734881'" onclick="socialLogin('google')">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button class="social-btn" onclick="window.location.href='https://www.facebook.com/?locale=ru_RU'" onclick="socialLogin('facebook')">
                    <svg fill="currentColor" viewBox="0 0 24 24">
                        <path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.96h-1.51c-1.49 0-1.95.93-1.95 1.88v2.26h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07z"/>
                    </svg>
                    Facebook
                </button>
            </div>
 
            <div class="register-link">
                Нет аккаунта?
                <a href="registr.html" id="registerLink">Зарегистрироваться</a>
            </div>
        </div>
    </div>
 
    <script>
        // Показать сообщение
        function showMessage(message, type = 'error') {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type} show`;
            
            const icon = type === 'error' 
                ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
                : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
            
            messageDiv.innerHTML = `${icon}<span>${message}</span>`;
            
            // Удалить предыдущие сообщения
            const existingMessages = container.querySelectorAll('.message');
            existingMessages.forEach(msg => msg.remove());
            
            container.appendChild(messageDiv);
            
            // Автоматически скрыть через 5 секунд
            setTimeout(() => {
                messageDiv.classList.remove('show');
                setTimeout(() => messageDiv.remove(), 300);
            }, 5000);
        }
 
        // Переключение видимости пароля
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password svg');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.outerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>';
            } else {
                passwordInput.type = 'password';
                toggleBtn.outerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>';
            }
        }
 
        // Функция входа
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = document.getElementById('submitBtn');
            
            // Валидация
            if (!email || !password) {
                showMessage('Пожалуйста, заполните все поля', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showMessage('Введите корректный email адрес', 'error');
                return;
            }
            
            // Показать загрузку
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> Вход...';
            submitBtn.disabled = true;
            
            // Имитация запроса к серверу
            setTimeout(() => {
                // Здесь должен быть реальный API запрос
                // Для демонстрации используем имитацию успешного входа
                
                // Проверка демо-данных (для тестирования)
                if (email === 'demo@example.com' && password === 'password123') {
                    showMessage('Успешный вход! Перенаправление...', 'success');
                    
                    // Сохраняем данные если выбран "Запомнить меня"
                    if (rememberMe) {
                        localStorage.setItem('userEmail', email);
                        localStorage.setItem('isLoggedIn', 'true');
                    } else {
                        sessionStorage.setItem('userEmail', email);
                        sessionStorage.setItem('isLoggedIn', 'true');
                    }
                    
                    // Перенаправление через 1.5 секунды
                    setTimeout(() => {
                        window.location.href = '/dashboard'; // Замените на реальный URL
                        showMessage('Перенаправление в личный кабинет...', 'success');
                    }, 1500);
                } else {
                    showMessage('Неверный email или пароль. Попробуйте demo@example.com / password123', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 1000);
        }
        
        // Валидация email
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return emailRegex.test(email);
        }
        
        // Социальный вход
        function socialLogin(provider) {
            showMessage(`Вход через ${provider}...`, 'success');
            // Здесь должна быть интеграция с OAuth
            setTimeout(() => {
                showMessage(`Демо-версия: вход через ${provider} будет доступен в ближайшее время`, 'info');
            }, 1000);
        }
        
        // Восстановление пароля
        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            showMessage('Инструкции по восстановлению пароля отправлены на вашу почту', 'success');
        });
        
        // Регистрация
        document.getElementById('registerLink').addEventListener('click', (e) => {
            e.preventDefault();
            showMessage('Переход на страницу регистрации...', 'success');
            setTimeout(() => {
                window.location.href = 'registr.html'; // Замените на реальный URL
            }, 1000);
        });
        
        // Добавляем обработчик формы
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        
        // Автозаполнение демо-данными для удобства тестирования
        document.getElementById('email').value = 'demo@example.com';
        document.getElementById('password').value = 'password123';
        
        // Проверка сохраненной сессии
        window.addEventListener('load', () => {
            const rememberedEmail = localStorage.getItem('userEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });
        
        // Добавляем обработку Enter
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
