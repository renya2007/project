<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Личный кабинет | Мой профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="static/cab.css">
</head>
<body>
<div class="dashboard" id="personalCabinet">
  <div class="profile-header">
    <div class="avatar" id="avatarDisplay">👤</div>
    <div class="user-info">
      <h2 id="displayName">—</h2>
      <div class="user-role">⚡ Новый пользователь</div>
      <div class="user-meta">
        <span>🆔 ID: <span id="displayId">—</span></span>
        <span>📅 Регистрация: <span id="regDate">—</span></span>
      </div>
    </div>
  </div>

  <div class="profile-body">
    <!-- Кнопка возврата на главный сайт -->
    <div class="back-section">
      <button class="btn-back" onclick="window.location.href='index2.html'" id="backToSiteBtn">
        ← Вернуться на главный сайт
      </button>
    </div>

    <div class="info-section">
      <div class="section-title">📋 Персональные данные</div>
      <div class="detail-card" id="infoCard">
        <div class="detail-row">
          <span class="detail-label">📧 Электронная почта</span>
          <span class="detail-value" id="infoEmail">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">📞 Телефон</span>
          <span class="detail-value" id="infoPhone">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">📍 Город</span>
          <span class="detail-value" id="infoCity">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">🎂 Дата рождения</span>
          <span class="detail-value" id="infoBirth">—</span>
        </div>
      </div>
    </div>

    <div class="info-section">
      <div class="section-title">✏️ Редактировать профиль</div>
      <div class="edit-form">
        <div class="form-group">
          <label>Полное имя</label>
          <input type="text" id="editName" placeholder="Иван Иванов" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" placeholder="example@domain.com" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" id="editPhone" placeholder="+7 900 123-45-67" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Город</label>
          <input type="text" id="editCity" placeholder="Москва, Санкт-Петербург..." autocomplete="off">
        </div>
        <div class="form-group">
          <label>Дата рождения (ДД.ММ.ГГГГ)</label>
          <input type="text" id="editBirth" placeholder="15.05.1992" autocomplete="off">
        </div>
        <div class="button-group">
          <button class="btn btn-primary" id="saveBtn">💾 Сохранить изменения</button>
          <button class="btn btn-outline" id="resetBtn">⟳ Очистить всё</button>
        </div>
        <div id="messageToast" class="toast-msg">✅ Данные обновлены</div>
      </div>
    </div>
  </div>
  <footer>
    🔒 Личный кабинет — данные хранятся только в браузере
  </footer>
</div>
<script src="static/cab.js"> </script>
</body>
</html>
